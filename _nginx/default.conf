server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve shared assets from parent path
    location /shared/ {
        alias /usr/share/nginx/html/../shared/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript;
}
